name: Deploy to GKE with Helm

on:
  push:
    branches:
      - main

env:
  GAR_LOCATION: us-central1 # Update to your Artifact Registry region
  GAR_REPOSITORY: my-registry # Update to your Artifact Registry name
  IMAGE_NAME: my-app
  GKE_CLUSTER: my-cluster # Update to your GKE cluster name
  GKE_ZONE: us-central1-a # Update to your GKE cluster zone
  HELM_RELEASE_NAME: my-app-release
  HELM_CHART_PATH: ./charts/my-app # Update to your Helm chart directory

jobs:
  deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Authenticate to Google Cloud
      uses: google-github-actions/auth@v2
      with:
        credentials_json: ${{ secrets.GCP_SA_KEY }}

    - name: Set up Cloud SDK
      uses: google-github-actions/setup-gcloud@v2

    - name: Configure Docker for GAR
      run: |
        gcloud auth configure-docker ${{ env.GAR_LOCATION }}-docker.pkg.dev --quiet

    - name: Build and Push Docker Image
      run: |
        TAG=${{ github.sha }}
        IMAGE_URL=${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.GAR_REPOSITORY }}/${{ env.IMAGE_NAME }}:$TAG
        
        docker build -t $IMAGE_URL .
        docker push $IMAGE_URL

    - name: Set up GKE Credentials
      uses: google-github-actions/get-gke-credentials@v2
      with:
        cluster_name: ${{ env.GKE_CLUSTER }}
        location: ${{ env.GKE_ZONE }}

    - name: Set up Helm
      uses: azure/setup-helm@v4
      with:
        version: 'v3.12.0'

    - name: Deploy with Helm
      run: |
        TAG=${{ github.sha }}
        IMAGE_URL=${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.GAR_REPOSITORY }}/${{ env.IMAGE_NAME }}
        
        helm upgrade --install ${{ env.HELM_RELEASE_NAME }} ${{ env.HELM_CHART_PATH }} \
          --namespace default \
          --set image.repository=$IMAGE_URL \
          --set image.tag=$TAG
